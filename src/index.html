<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App - Docker Checkpoint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="todo-container">
        <header>
            <h1>ToDo App</h1>
        </header>

        <main>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Nova tarefa (ex: Estudar Docker)...">
                <button id="add-btn">Adicionar</button>
            </div>

            <ul id="task-list">
                </ul>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
